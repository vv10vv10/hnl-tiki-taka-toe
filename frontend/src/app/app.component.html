<div class="game-container">

  <h1 class="game-title">Tiki Taka Toe</h1>

  <button class="btn-new-game" (click)="createGame()">
    New Game
  </button>

  <div *ngIf="gameId" class="game-id">
    <p>Game ID: {{ gameId }}</p>
  </div>

  <h2 *ngIf="gameId && !winner" class="turn-indicator">
    Turn: {{ currentTurn || 'X' }}
  </h2>

  <div *ngIf="winner">
    <h2 *ngIf="winner !== 'draw'" class="winner-banner">
      Winner: {{ winner }} 🎉
    </h2>

    <h2 *ngIf="winner === 'draw'" class="winner-banner draw">
      Draw 🤝
    </h2>
  </div>

  <div *ngIf="board.length" class="board-card">
    <div class="col-headers">
      <div *ngFor="let col of colRules" class="col-header">
        {{ col.display }}
      </div>
    </div>
    <div class="board-wrapper">
      <div *ngFor="let row of board; let i = index" class="board-row">
        <div class="row-header">
          {{ rowRules[i].display }}
        </div>
        <div
          *ngFor="let cell of row; let j = index"
          class="cell"
          [class.cell-selected]="selectedCell?.row === i && selectedCell?.col === j"
          [ngStyle]="{ 'cursor': (!cell.symbol || isFinished) ? 'pointer' : 'default' }"
          (click)="onCellClick(i, j)"
        >
          <div *ngIf="cell.symbol" class="jersey-wrap">
            <svg viewBox="0 0 100 110" class="jersey-svg">
              <path
                class="jersey-shape"
                [ngClass]="{'jersey-x': cell.symbol === 'X', 'jersey-o': cell.symbol === 'O'}"
                d="M35,6 C38,14 44,19 50,19 C56,19 62,14 65,6 L88,24 L76,40 L69,34 L69,100 L31,100 L31,34 L24,40 L12,24 Z"
              />
              <text x="50" y="66" class="jersey-letter" text-anchor="middle">{{ cell.symbol }}</text>
            </svg>
          </div>
          <div class="cell-player" *ngIf="cell.symbol">
            {{ cell.player }}
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="showPicker" class="modal">
    <div class="player-list-box">
      <input
        type="text"
        placeholder="Search player..."
        [(ngModel)]="searchTerm"
        (input)="onSearchChange(searchTerm)"
      />
      <div class="players-container">
        <div
          *ngFor="let player of filteredPlayers"
          (click)="selectPlayer(player)"
          class="player-item"
        >
          {{ player.search_name }}
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="showPossiblePlayersModal" class="modal">
    <div class="player-list-box">
      <h3>Possible players</h3>
      <div class="players-container">
        <div *ngFor="let player of possiblePlayers" class="possible-player-item">
          {{ player.search_name }}
        </div>
      </div>
      <button class="btn-close" (click)="showPossiblePlayersModal = false">
        Close
      </button>
    </div>
  </div>

  <div *ngIf="showInvalidMoveFeedback" class="invalid-move">
    Invalid move ❌
  </div>

</div>
